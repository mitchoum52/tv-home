<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>TV Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syncopate:wght@400;700&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #04060f;
    --accent:   #1e90ff;
    --accent2:  #00cfff;
    --accent3:  #7b5fff;
    --accent-r: 30;
    --accent-g: 144;
    --accent-b: 255;
    --glass:    rgba(255,255,255,0.04);
    --glass-border: rgba(255,255,255,0.08);
    --glass-active: rgba(var(--accent-r),var(--accent-g),var(--accent-b),0.12);
    --text:     #c8d8f0;
    --text-dim: #3a4f6e;
    --font-ui:  'Rajdhani', sans-serif;
    --font-big: 'Syncopate', sans-serif;
    --font-mono:'Space Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    overflow: hidden;
    user-select: none;
    cursor: none;
  }

  .bg-layer {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none;
  }
  .bg-layer::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 15% 50%, rgba(var(--accent-r),var(--accent-g),var(--accent-b),0.13) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 85% 20%, rgba(var(--accent-r),var(--accent-g),var(--accent-b),0.09) 0%, transparent 55%),
      radial-gradient(ellipse 50% 50% at 60% 85%, rgba(var(--accent-r),var(--accent-g),var(--accent-b),0.06) 0%, transparent 50%);
  }
  .bg-layer::after {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(var(--accent-r),var(--accent-g),var(--accent-b),0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(var(--accent-r),var(--accent-g),var(--accent-b),0.035) 1px, transparent 1px);
    background-size: 52px 52px;
    mask-image: radial-gradient(ellipse 90% 90% at 50% 50%, black 20%, transparent 75%);
  }

  .orb {
    position: fixed; border-radius: 50%;
    filter: blur(90px);
    pointer-events: none; z-index: 0;
    animation: orb-drift 14s ease-in-out infinite alternate;
  }
  .orb-1 { width: 500px; height: 500px; background: rgba(var(--accent-r),var(--accent-g),var(--accent-b),0.1); top: -150px; left: -150px; }
  .orb-2 { width: 350px; height: 350px; background: rgba(var(--accent-r),var(--accent-g),var(--accent-b),0.08); bottom: -100px; right: -100px; animation-delay: -5s; }
  .orb-3 { width: 280px; height: 280px; background: rgba(var(--accent-r),var(--accent-g),var(--accent-b),0.06); top: 25%; right: 5%; animation-delay: -9s; }
  @keyframes orb-drift {
    from { transform: translate(0,0) scale(1); }
    to   { transform: translate(25px,18px) scale(1.08); }
  }

  .wrapper {
    position: relative; z-index: 1;
    width: 100%; height: 100%;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 36px 52px 30px;
    gap: 24px;
  }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .clock-block { display: flex; align-items: baseline; gap: 18px; }
  #clock {
    font-family: var(--font-mono);
    font-size: clamp(40px, 5.5vw, 76px);
    font-weight: 700;
    letter-spacing: -.02em;
    line-height: 1;
    background: linear-gradient(135deg, #ffffff 0%, var(--accent2) 55%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  #date {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .25em;
    color: var(--text-dim);
    text-transform: uppercase;
    align-self: center;
  }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .signal-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent2);
    box-shadow: 0 0 8px var(--accent2);
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%,100% { opacity:1; transform:scale(1); }
    50%     { opacity:.3; transform:scale(.65); }
  }
  .header-label {
    font-family: var(--font-big);
    font-size: 9px;
    letter-spacing: .35em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  /* CENTRE */
  .center {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    min-height: 0;
  }

  /* Grande carte */
  .main-card {
    flex-shrink: 0;
    width: clamp(280px, 32vw, 460px);
    height: clamp(190px, 24vh, 290px);
    border-radius: 28px;
    background: var(--glass-active);
    border: 1px solid rgba(var(--accent-r),var(--accent-g),var(--accent-b),0.3);
    backdrop-filter: blur(28px);
    -webkit-backdrop-filter: blur(28px);
    box-shadow:
      0 0 0 1px rgba(var(--accent-r),var(--accent-g),var(--accent-b),0.12),
      0 12px 64px rgba(var(--accent-r),var(--accent-g),var(--accent-b),0.18),
      inset 0 1px 0 rgba(255,255,255,0.09);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 26px 30px;
    position: relative;
    overflow: hidden;
    transition: box-shadow .35s;
  }
  .main-card::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 130% 70% at 50% -10%, rgba(var(--accent-r),var(--accent-g),var(--accent-b),0.22) 0%, transparent 65%);
    pointer-events: none;
  }
  .main-shine {
    position: absolute; top: -1px; left: 15%; right: 15%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
  }
  .main-num {
    font-family: var(--font-mono);
    font-size: 10px;
    color: rgba(var(--accent-r),var(--accent-g),var(--accent-b),0.55);
    letter-spacing: .2em;
  }
  .main-name {
    font-family: var(--font-big);
    font-size: clamp(16px, 2.2vw, 30px);
    word-break: break-word;
    font-weight: 700;
    color: #fff;
    letter-spacing: -.01em;
    line-height: 1.15;
  }
  .main-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .main-url {
    font-family: var(--font-mono);
    font-size: 10px;
    color: rgba(var(--accent-r),var(--accent-g),var(--accent-b),0.45);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 180px;
  }
  .main-arrow {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(var(--accent-r),var(--accent-g),var(--accent-b),0.18);
    border: 1px solid rgba(var(--accent-r),var(--accent-g),var(--accent-b),0.35);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: var(--accent2);
    flex-shrink: 0;
  }

  /* Cartes latérales */
  .cards-stack { display: flex; flex-direction: column; gap: 10px; }

  .btn {
    position: relative;
    width: max-content;
    min-width: 160px;
    padding: 16px 20px;
    border-radius: 14px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    cursor: none;
    text-decoration: none;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all .22s cubic-bezier(.4,0,.2,1);
  }
  .btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(var(--accent-r),var(--accent-g),var(--accent-b),0.07) 0%, transparent 70%);
    opacity: 0; transition: opacity .25s;
    border-radius: 14px;
  }
  .btn.active {
    border-color: rgba(var(--accent-r),var(--accent-g),var(--accent-b),0.45);
    background: rgba(var(--accent-r),var(--accent-g),var(--accent-b),0.09);
    box-shadow: 0 0 0 1px rgba(var(--accent-r),var(--accent-g),var(--accent-b),0.18), 0 4px 20px rgba(var(--accent-r),var(--accent-g),var(--accent-b),0.12);
  }
  .btn.active::before { opacity: 1; }
  .btn.active .btn-name { color: #fff; }
  .btn.active .btn-num  { color: var(--accent); }
  .btn.active .btn-dot  { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }

  .btn-num  { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); flex-shrink: 0; transition: color .2s; }
  .btn-name { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; white-space: nowrap; letter-spacing: .02em; transition: color .2s; }
  .btn-dot  { width: 5px; height: 5px; border-radius: 50%; background: var(--text-dim); flex-shrink: 0; transition: background .2s, box-shadow .2s; }

  /* Points navigation */
  .pos-dots { display: flex; gap: 5px; align-items: center; }
  .pos-dot {
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--text-dim);
    transition: all .25s cubic-bezier(.4,0,.2,1);
  }
  .pos-dot.active { background: var(--accent); box-shadow: 0 0 6px var(--accent); width: 18px; border-radius: 2px; }

  /* FOOTER */
  .footer { display: flex; align-items: center; justify-content: center; position: relative; }
  .hint { display: flex; gap: 18px; position: absolute; left: 0; }
  .hint-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--text-dim); letter-spacing: .1em; text-transform: uppercase; }
  .hint-key { font-family: var(--font-mono); font-size: 9px; padding: 2px 5px; border: 1px solid rgba(58,79,110,0.5); border-radius: 3px; color: var(--text-dim); opacity: .6; }

  /* SETTINGS BTN */
  #btn-settings {
    position: fixed; bottom: 26px; right: 30px;
    width: 50px; height: 50px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(12px);
    border-radius: 50%;
    color: var(--text-dim);
    font-size: 19px;
    cursor: none;
    display: flex; align-items: center; justify-content: center;
    z-index: 50;
    transition: border-color .2s, color .2s, transform .3s, box-shadow .2s;
  }
  #btn-settings:hover { border-color: rgba(var(--accent-r),var(--accent-g),var(--accent-b),0.4); color: var(--accent); transform: rotate(60deg); }
  #btn-settings.settings-focused {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 0 2px rgba(var(--accent-r),var(--accent-g),var(--accent-b),0.25), 0 0 28px rgba(var(--accent-r),var(--accent-g),var(--accent-b),0.3);
    transform: rotate(60deg);
  }

  /* OVERLAY */
  #overlay {
    position: fixed; inset: 0;
    background: rgba(4,6,15,.82);
    backdrop-filter: blur(18px);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity .25s;
  }
  #overlay.open { opacity: 1; pointer-events: all; cursor: default; }

  /* Onglets */
  .tabs { display: flex; gap: 4px; background: var(--glass); border-radius: 10px; padding: 4px; }
  .tab {
    flex: 1; padding: 8px 16px; border-radius: 7px; border: none;
    background: transparent; color: var(--text-dim);
    font-family: var(--font-ui); font-size: 13px; font-weight: 600;
    letter-spacing: .08em; text-transform: uppercase;
    cursor: pointer; transition: all .2s;
  }
  .tab.active { background: var(--glass-active); color: #fff; border: 1px solid rgba(var(--accent-r),var(--accent-g),var(--accent-b),0.3); }
  .tab-panel { display: none; }
  .tab-panel.active { display: flex; flex-direction: column; gap: 16px; }

  /* Color picker */
  .color-section { display: flex; flex-direction: column; gap: 14px; }
  .color-label { font-size: 11px; text-transform: uppercase; letter-spacing: .15em; color: var(--text-dim); }
  .color-canvas-wrap {
    position: relative; border-radius: 12px; overflow: hidden;
    border: 1px solid var(--glass-border);
    cursor: crosshair;
  }
  #color-canvas { display: block; width: 100%; height: 180px; }
  .hue-wrap {
    position: relative; border-radius: 8px; overflow: hidden;
    border: 1px solid var(--glass-border); cursor: crosshair;
    margin-top: 8px;
  }
  #hue-canvas { display: block; width: 100%; height: 20px; }
  .color-preview-row { display: flex; align-items: center; gap: 12px; }
  .color-preview {
    width: 40px; height: 40px; border-radius: 10px;
    border: 1px solid var(--glass-border);
    flex-shrink: 0;
    box-shadow: 0 0 16px rgba(0,0,0,0.4);
  }
  .color-hex {
    font-family: var(--font-mono); font-size: 13px; color: var(--text);
    background: var(--glass); border: 1px solid var(--glass-border);
    border-radius: 6px; padding: 6px 10px; flex: 1;
    outline: none; cursor: text;
  }
  .color-apply {
    padding: 8px 18px; border-radius: 8px; cursor: pointer;
    background: rgba(var(--accent-r),var(--accent-g),var(--accent-b),0.2); border: 1px solid rgba(var(--accent-r),var(--accent-g),var(--accent-b),0.4);
    color: #fff; font-family: var(--font-ui); font-size: 13px; font-weight: 600;
    transition: all .2s; white-space: nowrap;
  }
  .color-apply:hover { background: rgba(var(--accent-r),var(--accent-g),var(--accent-b),0.35); }

  /* Préréglages */
  .presets { display: flex; gap: 8px; flex-wrap: wrap; }
  .preset {
    width: 28px; height: 28px; border-radius: 50%;
    cursor: pointer; border: 2px solid transparent;
    transition: transform .15s, border-color .15s;
    flex-shrink: 0;
  }
  .preset:hover { transform: scale(1.2); border-color: rgba(255,255,255,0.4); }
  #overlay.open * { cursor: default; }
  #overlay.open input { cursor: text; }
  #overlay.open button { cursor: pointer; }
  .modal {
    background: rgba(8,12,26,0.92);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    width: min(520px, 92vw);
    max-height: 80vh; overflow-y: auto;
    padding: 28px;
    display: flex; flex-direction: column; gap: 20px;
    box-shadow: 0 0 0 1px rgba(var(--accent-r),var(--accent-g),var(--accent-b),0.08), 0 32px 80px rgba(0,0,0,0.7);
  }
  .modal-header { display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-family: var(--font-big); font-size: 15px; font-weight: 700; color: #fff; letter-spacing: .06em; }
  .modal-close { background: transparent; border: none; color: var(--text-dim); font-size: 18px; cursor: pointer; }
  .site-list { display: flex; flex-direction: column; gap: 8px; }
  .site-row { display: flex; align-items: center; gap: 10px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 10px; padding: 10px 12px; }
  .site-row-grip { color: var(--text-dim); font-size: 12px; }
  .site-row-info { flex: 1; min-width: 0; }
  .site-row-name { font-size: 14px; font-weight: 600; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .site-row-url  { font-size: 10px; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .site-row-actions { display: flex; gap: 6px; }
  .row-btn { width: 28px; height: 28px; background: transparent; border: 1px solid var(--glass-border); border-radius: 6px; color: var(--text-dim); font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: border-color .15s, color .15s; }
  .row-btn:hover { border-color: var(--accent); color: var(--accent); }
  .row-btn.danger:hover { background: rgba(255,80,80,.1); color: #ff6b6b; border-color: #ff6b6b; }
  .form-block { border-top: 1px solid var(--glass-border); padding-top: 18px; display: flex; flex-direction: column; gap: 10px; }
  .form-block label { font-size: 10px; text-transform: uppercase; color: var(--text-dim); letter-spacing: .12em; }
  .form-block input { width: 100%; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 8px; padding: 9px 12px; color: var(--text); outline: none; font-family: var(--font-ui); font-size: 14px; transition: border-color .2s; }
  .form-block input:focus { border-color: rgba(var(--accent-r),var(--accent-g),var(--accent-b),0.5); }
  .form-row { display: flex; gap: 8px; }
  .form-btn { flex: 1; padding: 10px; border-radius: 8px; cursor: pointer; border: 1px solid var(--glass-border); background: var(--glass); color: var(--text); font-family: var(--font-ui); font-size: 14px; font-weight: 600; transition: all .2s; }
  .form-btn:hover { border-color: rgba(var(--accent-r),var(--accent-g),var(--accent-b),0.4); }
  .form-btn.primary { background: rgba(var(--accent-r),var(--accent-g),var(--accent-b),0.18); border-color: rgba(var(--accent-r),var(--accent-g),var(--accent-b),0.45); color: #fff; }
  .form-btn.primary:hover { background: rgba(var(--accent-r),var(--accent-g),var(--accent-b),0.28); }
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="wrapper">

  <div class="header">
    <div class="clock-block">
      <div id="clock">00:00</div>
      <div id="date">—</div>
    </div>
    <div class="header-right">
      <div class="signal-dot"></div>
      <div class="header-label">TV Home</div>
    </div>
  </div>

  <div class="center">
    <div class="main-card" id="main-card">
      <div class="main-shine"></div>
      <div class="main-num" id="main-num">01</div>
      <div class="main-name" id="main-name">—</div>
      <div class="main-footer">
        <div class="main-url" id="main-url">—</div>
        <div class="main-arrow">↗</div>
      </div>
    </div>
    <div class="cards-stack" id="sites"></div>
  </div>

  <div class="footer">
    <div class="hint">
      <div class="hint-item"><span class="hint-key">↑↓</span> naviguer</div>
      <div class="hint-item"><span class="hint-key">→</span> paramètres</div>
      <div class="hint-item"><span class="hint-key">←</span> retour</div>
      <div class="hint-item"><span class="hint-key">↵</span> ouvrir</div>
    </div>
    <div class="pos-dots" id="pos-dots"></div>
  </div>

</div>

<button id="btn-settings" title="Gérer les sites">⚙</button>

<div id="overlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Paramètres</span>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="sites">Sites</button>
      <button class="tab" data-tab="appearance">Apparence</button>
    </div>

    <!-- Onglet Sites -->
    <div class="tab-panel active" id="panel-sites">
      <div class="site-list" id="site-list"></div>
      <div class="form-block">
        <div style="font-size:11px;color:var(--text-dim);margin-bottom:8px;letter-spacing:.12em;text-transform:uppercase" id="form-title">Ajouter un site</div>
        <div>
          <label>Nom affiché</label>
          <input type="text" id="inp-name" placeholder="Ex : Arte TV" autocomplete="off" />
        </div>
        <div style="margin-top:8px">
          <label>URL</label>
          <input type="url" id="inp-url" placeholder="https://..." autocomplete="off" />
        </div>
        <div class="form-row" style="margin-top:12px">
          <button class="form-btn" id="form-cancel">Annuler</button>
          <button class="form-btn primary" id="form-save">Ajouter</button>
        </div>
      </div>
    </div>

    <!-- Onglet Apparence -->
    <div class="tab-panel" id="panel-appearance">
      <div class="color-section">
        <div class="color-label">Couleur d'accent</div>
        <div class="color-canvas-wrap" id="color-canvas-wrap">
          <canvas id="color-canvas"></canvas>
        </div>
        <div class="hue-wrap" id="hue-wrap">
          <canvas id="hue-canvas"></canvas>
        </div>
        <div class="color-preview-row">
          <div class="color-preview" id="color-preview"></div>
          <input class="color-hex" id="color-hex" type="text" maxlength="7" />
          <button class="color-apply" id="color-apply">Appliquer</button>
        </div>
        <div>
          <div class="color-label" style="margin-bottom:8px">Préréglages</div>
          <div class="presets" id="presets"></div>
        </div>
      </div>
    </div>

  </div>
</div>


<script>
const DEFAULT_SITES = [
  { name: "Flemmix",       url: "https://flemmix.surf/"         },
  { name: "Xefod",         url: "https://xefod.com/"            },
  { name: "PapaduStream",  url: "https://papadustream.archi/"   },
  { name: "French Stream", url: "https://french-stream.one/"    },
  { name: "YouTube",       url: "https://www.youtube.com/"      },
];

const STORAGE_KEY = 'tv-dashboard-sites';
let sites = [], editIdx = null, activeIdx = 0, focusZone = 'sites';

function load() {
  try { const r = localStorage.getItem(STORAGE_KEY); sites = r ? JSON.parse(r) : [...DEFAULT_SITES]; }
  catch { sites = [...DEFAULT_SITES]; }
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(sites)); }

function tick() {
  const now = new Date(), pad = n => String(n).padStart(2,'0');
  const days   = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  const months = ['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];
  document.getElementById('clock').textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
  document.getElementById('date').textContent  = `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]}`;
}

function updateMainCard(idx) {
  const site = sites[idx]; if (!site) return;
  document.getElementById('main-num').textContent  = String(idx+1).padStart(2,'0');
  document.getElementById('main-name').textContent = site.name;
  try { document.getElementById('main-url').textContent = new URL(site.url).hostname; }
  catch { document.getElementById('main-url').textContent = site.url; }
}

function updateDots() {
  const dots = document.getElementById('pos-dots');
  dots.innerHTML = '';
  sites.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'pos-dot' + (i === activeIdx && focusZone === 'sites' ? ' active' : '');
    dots.appendChild(d);
  });
}

function setActive(idx) {
  const btns = document.querySelectorAll('.btn');
  if (!btns.length) return;
  idx = Math.max(0, Math.min(idx, btns.length - 1));
  btns.forEach(b => b.classList.remove('active'));
  btns[idx].classList.add('active');
  activeIdx = idx; focusZone = 'sites';
  document.getElementById('btn-settings').classList.remove('settings-focused');
  updateMainCard(idx);
  updateDots();
}

function setSettingsActive(active) {
  const btn = document.getElementById('btn-settings');
  if (active) {
    btn.classList.add('settings-focused');
    focusZone = 'settings';
    document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
    // Afficher "Paramètres" dans la grande carte
    document.getElementById('main-num').textContent  = '⚙';
    document.getElementById('main-name').textContent = 'Paramètres';
    document.getElementById('main-url').textContent  = 'gérer les sites';
  } else {
    btn.classList.remove('settings-focused');
    focusZone = 'sites';
    const btns = document.querySelectorAll('.btn');
    if (btns[activeIdx]) btns[activeIdx].classList.add('active');
    updateMainCard(activeIdx);
  }
  updateDots();
}

function getHomeBtn() {
  return Array.from(document.querySelectorAll('div'))
    .find(el => el.innerText.trim() === '⌂' && el.style.position === 'fixed') || null;
}
function resetHomeBtn() {
  const h = getHomeBtn(); if (!h) return;
  h.style.borderColor = '#1e1e24';
  h.style.transform   = 'scale(1)';
  h.style.boxShadow   = '0 4px 24px rgba(0,0,0,0.6)';
}
function highlightHome() {
  const h = getHomeBtn(); if (!h) return;
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-settings').classList.remove('settings-focused');
  focusZone = 'home';
  h.style.borderColor = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
  h.style.transform   = 'scale(1.12)';
  const _r = getComputedStyle(document.documentElement).getPropertyValue('--accent-r').trim();
  const _g = getComputedStyle(document.documentElement).getPropertyValue('--accent-g').trim();
  const _b = getComputedStyle(document.documentElement).getPropertyValue('--accent-b').trim();
  h.style.boxShadow = '0 0 0 2px ' + getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() + ', 0 8px 32px rgba(' + _r + ',' + _g + ',' + _b + ',0.35)';
  updateDots();
}

function navigateHorizontal(dir) {
  if (dir === 1) {
    // droite → paramètres
    setSettingsActive(true);
  } else {
    // gauche → retour aux sites si on est sur paramètres
    if (focusZone === 'settings') {
      setSettingsActive(false);
    }
  }
}

function openActive() {
  const overlay = document.getElementById('overlay');
  if (overlay.classList.contains('open')) return;
  if (focusZone === 'home')     { const h = getHomeBtn(); if (h) h.click(); }
  else if (focusZone === 'settings') { setSettingsActive(false); renderList(); overlay.classList.add('open'); }
  else if (sites[activeIdx])    { window.location.href = sites[activeIdx].url; }
}

// GESTES
const STEP_Y = 15;
const STEP_X = 100;
let accumX = 0, accumY = 0, lastMX = null, lastMY = null, cooldown = false;

function triggerNav(dir) {
  if (cooldown) return;
  if (dir === 'down' && focusZone === 'sites') { setActive(activeIdx + 1); }
  if (dir === 'up'   && focusZone === 'sites') { setActive(activeIdx - 1); }
  if (dir === 'right') navigateHorizontal(1);
  if (dir === 'left')  navigateHorizontal(-1);
  accumX = 0; accumY = 0;
  cooldown = true; setTimeout(() => { cooldown = false; }, 300);
}

document.addEventListener('mousemove', e => {
  if (document.getElementById('overlay').classList.contains('open')) return;
  if (lastMX === null) { lastMX = e.clientX; lastMY = e.clientY; return; }
  const dx = e.clientX - lastMX, dy = e.clientY - lastMY;
  lastMX = e.clientX; lastMY = e.clientY;
  if (Math.abs(dx) < 2 && Math.abs(dy) < 2) return;
  accumX += dx; accumY += dy;
  if (Math.abs(accumX) >= STEP_X && Math.abs(accumX) > Math.abs(accumY))
    triggerNav(accumX > 0 ? 'right' : 'left');
  else if (Math.abs(accumY) >= STEP_Y && Math.abs(accumY) > Math.abs(accumX))
    triggerNav(accumY > 0 ? 'down' : 'up');
});

let idleTimer = null;
document.addEventListener('mousemove', () => {
  clearTimeout(idleTimer);
  idleTimer = setTimeout(() => { accumX = 0; accumY = 0; }, 400);
});

let touchStartX = null, touchStartY = null;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; }, { passive: true });
document.addEventListener('touchend', e => {
  if (touchStartX === null) return;
  const dx = e.changedTouches[0].clientX - touchStartX, dy = e.changedTouches[0].clientY - touchStartY;
  const adx = Math.abs(dx), ady = Math.abs(dy);
  if (adx < 10 && ady < 10) openActive();
  else if (adx > 40 && adx > ady) triggerNav(dx > 0 ? 'right' : 'left');
  else if (ady > 40 && ady > adx) triggerNav(dy > 0 ? 'down' : 'up');
  touchStartX = null; touchStartY = null;
});

let clickStartX = null, clickStartY = null;
document.addEventListener('mousedown', e => { clickStartX = e.clientX; clickStartY = e.clientY; });
document.addEventListener('mouseup', e => {
  if (clickStartX === null) return;
  const dx = Math.abs(e.clientX - clickStartX), dy = Math.abs(e.clientY - clickStartY);
  if (dx < 8 && dy < 8 && !e.target.closest('#btn-settings, #overlay')) openActive();
  clickStartX = null; clickStartY = null;
});

document.addEventListener('keydown', e => {
  if (document.getElementById('overlay').classList.contains('open')) {
    if (e.key === 'Escape') document.getElementById('overlay').classList.remove('open');
    return;
  }
  if (e.key === 'ArrowDown' && focusZone === 'sites') { e.preventDefault(); setActive(activeIdx + 1); }
  if (e.key === 'ArrowUp'   && focusZone === 'sites') { e.preventDefault(); setActive(activeIdx - 1); }
  if (e.key === 'ArrowRight') { e.preventDefault(); navigateHorizontal(1); }
  if (e.key === 'ArrowLeft')  { e.preventDefault(); navigateHorizontal(-1); }
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openActive(); }
  const num = parseInt(e.key);
  if (num >= 1 && num <= sites.length) { resetHomeBtn(); setSettingsActive(false); setActive(num - 1); }
});

function renderButtons() {
  const container = document.getElementById('sites');
  container.innerHTML = '';
  sites.forEach((site, i) => {
    const a = document.createElement('a');
    a.className = 'btn';
    a.innerHTML = `
      <span class="btn-num">${String(i+1).padStart(2,'0')}</span>
      <span class="btn-name">${site.name}</span>
      <span class="btn-dot"></span>
    `;
    container.appendChild(a);
  });
  document.fonts.ready.then(() => {
    requestAnimationFrame(() => {
      // Uniformise la largeur sur le bouton le plus large
      const btns = container.querySelectorAll('.btn');
      btns.forEach(b => { b.style.width = 'max-content'; });
      let maxW = 0;
      btns.forEach(b => { maxW = Math.max(maxW, b.offsetWidth); });
      btns.forEach(b => { b.style.width = maxW + 'px'; });
      setActive(Math.min(activeIdx, sites.length - 1));
      updateDots();
    });

  const list = document.getElementById('site-list');
  list.innerHTML = '';

    const row = document.createElement('div');
    row.className = 'site-row';
    row.innerHTML = `

        <div class="site-row-url">${site.url}</div>
      </div>
      <div class="site-row-actions">
        <button class="row-btn" data-action="up"   data-idx="${i}">↑</button>

        <button class="row-btn" data-action="edit" data-idx="${i}">✎</button>
        <button class="row-btn danger" data-action="del" data-idx="${i}">✕</button>
      </div>
    `;

  });
  list.querySelectorAll('.row-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.idx), action = btn.dataset.action;
      if (action === 'up'   && idx > 0)               [sites[idx-1],sites[idx]] = [sites[idx],sites[idx-1]];
      if (action === 'down' && idx < sites.length - 1) [sites[idx],sites[idx+1]] = [sites[idx+1],sites[idx]];

      if (action === 'edit') { openEdit(idx); return; }
      save(); renderList(); renderButtons();
    });
  });
}

// Connexion au serveur local pour recevoir les commandes de la télécommande
(function initTV() {
  const WS_URL = 'ws://192.168.1.100:8765/tv';
  let ws = null;

  function connect() {
    try {
      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        console.log('[TV Remote] connecté');
      };

      ws.onmessage = e => {
        try {
          const msg = JSON.parse(e.data);
          const a   = msg.action;
          const overlay = document.getElementById('overlay');
          const isOpen  = overlay && overlay.classList.contains('open');

          if      (a === 'nav_right')    { if (!isOpen) triggerNav('right'); }
          else if (a === 'nav_left')     { if (!isOpen) triggerNav('left'); }
          else if (a === 'nav_up')       { if (!isOpen) triggerNav('up'); }
          else if (a === 'nav_down')     { if (!isOpen) triggerNav('down'); }
          else if (a === 'nav_enter')    { openActive(); }
          else if (a === 'nav_settings') {
            if (!isOpen) { setSettingsActive(true); renderList(); overlay.classList.add('open'); }
            else { overlay.classList.remove('open'); setSettingsActive(false); }
          }
          else if (a === 'nav_home') {
            // Retour accueil — sur cette page on ne fait rien (on y est déjà)
            console.log('[TV Remote] déjà sur accueil');
          }
        } catch(err) {
          console.warn('[TV Remote] message invalide', err);
        }
      };

      ws.onclose = () => {
        console.log('[TV Remote] déconnecté, reconnexion dans 3s...');
        setTimeout(connect, 3000);
      };

      ws.onerror = () => ws.close();

    } catch(err) {
      console.warn('[TV Remote] erreur WebSocket', err);
      setTimeout(connect, 3000);
    }
  }

  connect();
})();

// ── COLOR PICKER ──
const COLOR_KEY = 'tv-accent-color';
let currentHue = 210; // bleu par défaut
let pickerX = 1, pickerY = 0; // position dans le carré SL (0-1)
let pickerInitialized = false;

const PRESETS = [
  '#1e90ff','#00cfff','#7b5fff','#ff3c6e','#ff6b1a',
  '#ffcc00','#00e676','#00bcd4','#e040fb','#ffffff'
];

function hslToHex(h, s, l) {
  s /= 100; l /= 100;
  const k = n => (n + h / 30) % 12;
  const a = s * Math.min(l, 1 - l);
  const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
  return '#' + [f(0),f(8),f(4)].map(v => Math.round(v*255).toString(16).padStart(2,'0')).join('');
}

function hexToHsl(hex) {
  let r = parseInt(hex.slice(1,3),16)/255;
  let g = parseInt(hex.slice(3,5),16)/255;
  let b = parseInt(hex.slice(5,7),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h, s, l = (max+min)/2;
  if (max === min) { h = s = 0; }
  else {
    const d = max - min;
    s = l > 0.5 ? d/(2-max-min) : d/(max+min);
    switch(max) {
      case r: h = ((g-b)/d + (g<b?6:0))/6; break;
      case g: h = ((b-r)/d + 2)/6; break;
      case b: h = ((r-g)/d + 4)/6; break;
    }
  }
  return [h*360, s*100, l*100];
}

function drawSLSquare(canvas, hue) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  // Gradient horizontal : blanc → couleur pure
  const gradH = ctx.createLinearGradient(0, 0, w, 0);
  gradH.addColorStop(0, 'white');
  gradH.addColorStop(1, `hsl(${hue},100%,50%)`);
  ctx.fillStyle = gradH;
  ctx.fillRect(0, 0, w, h);
  // Gradient vertical : transparent → noir
  const gradV = ctx.createLinearGradient(0, 0, 0, h);
  gradV.addColorStop(0, 'rgba(0,0,0,0)');
  gradV.addColorStop(1, 'rgba(0,0,0,1)');
  ctx.fillStyle = gradV;
  ctx.fillRect(0, 0, w, h);
}

function drawHueBar(canvas) {
  const ctx = canvas.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, canvas.width, 0);
  for (let i = 0; i <= 360; i += 30)
    grad.addColorStop(i/360, `hsl(${i},100%,50%)`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function drawCursor(canvas, x, y) {
  const ctx = canvas.getContext('2d');
  const cx = x * canvas.width, cy = y * canvas.height;
  ctx.beginPath();
  ctx.arc(cx, cy, 7, 0, Math.PI*2);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(cx, cy, 5, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(0,0,0,0.5)';
  ctx.lineWidth = 1;
  ctx.stroke();
}

function drawHueCursor(canvas, hue) {
  const ctx = canvas.getContext('2d');
  const x = (hue / 360) * canvas.width;
  ctx.beginPath();
  ctx.rect(x - 3, 0, 6, canvas.height);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.stroke();
}

function updatePickerColor() {
  // Convertit position + hue en hex
  const s = pickerX * 100;
  const l = (1 - pickerY) * (100 - s/2);
  const hex = hslToHex(currentHue, s === 0 ? 0 : s * 100 / (100 - Math.abs(2*l - 100)), l);
  document.getElementById('color-preview').style.background = hex;
  document.getElementById('color-hex').value = hex;
  return hex;
}

function redrawPicker() {
  const slCanvas  = document.getElementById('color-canvas');
  const hueCanvas = document.getElementById('hue-canvas');
  drawSLSquare(slCanvas, currentHue);
  drawCursor(slCanvas, pickerX, pickerY);
  drawHueBar(hueCanvas);
  drawHueCursor(hueCanvas, currentHue);
  const hex = updatePickerColor();
  // Aperçu live sur la page sans sauvegarder
  if (hex && /^#[0-9a-fA-F]{6}$/.test(hex)) {
    const [hh,ss,ll] = hexToHsl(hex);
    const hex2 = hslToHex((hh+15)%360, Math.min(ss+10,100), Math.min(ll+15,90));
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    document.documentElement.style.setProperty('--accent',   hex);
    document.documentElement.style.setProperty('--accent2',  hex2);
    document.documentElement.style.setProperty('--accent-r', r);
    document.documentElement.style.setProperty('--accent-g', g);
    document.documentElement.style.setProperty('--accent-b', b);
    document.documentElement.style.setProperty('--glass-active', 'rgba('+r+','+g+','+b+',0.12)');
  }
}

function initColorPicker() {
  if (pickerInitialized) { redrawPicker(); return; }
  pickerInitialized = true;

  const slCanvas  = document.getElementById('color-canvas');
  const hueCanvas = document.getElementById('hue-canvas');
  const wrap      = document.getElementById('color-canvas-wrap');

  // Taille réelle
  slCanvas.width  = wrap.clientWidth;
  slCanvas.height = 180;
  hueCanvas.width  = wrap.clientWidth;
  hueCanvas.height = 20;

  // Charger la couleur sauvegardée
  const saved = localStorage.getItem(COLOR_KEY);
  if (saved) {
    const [h, s, l] = hexToHsl(saved);
    currentHue = h;
    pickerX = s / 100;
    pickerY = 1 - (l / (100 - s/2));
  }

  redrawPicker();

  // Drag sur le carré SL
  let draggingSL = false;
  function pickSL(e) {
    const r = slCanvas.getBoundingClientRect();
    const cx = e.clientX ?? e.touches?.[0]?.clientX;
    const cy = e.clientY ?? e.touches?.[0]?.clientY;
    pickerX = Math.max(0, Math.min(1, (cx - r.left) / r.width));
    pickerY = Math.max(0, Math.min(1, (cy - r.top)  / r.height));
    redrawPicker();
  }
  slCanvas.addEventListener('mousedown',  e => { draggingSL = true; pickSL(e); });
  document.addEventListener('mousemove',  e => { if (draggingSL) pickSL(e); });
  document.addEventListener('mouseup',    () => { draggingSL = false; });

  // Drag sur la barre de teinte
  let draggingHue = false;
  function pickHue(e) {
    const r = hueCanvas.getBoundingClientRect();
    const cx = e.clientX ?? e.touches?.[0]?.clientX;
    currentHue = Math.max(0, Math.min(360, ((cx - r.left) / r.width) * 360));
    redrawPicker();
  }
  hueCanvas.addEventListener('mousedown', e => { draggingHue = true; pickHue(e); });
  document.addEventListener('mousemove',  e => { if (draggingHue) pickHue(e); });
  document.addEventListener('mouseup',    () => { draggingHue = false; });

  // Préréglages
  const presetsEl = document.getElementById('presets');
  presetsEl.innerHTML = '';
  PRESETS.forEach(hex => {
    const p = document.createElement('div');
    p.className = 'preset';
    p.style.background = hex;
    p.addEventListener('click', () => {
      const [h,s,l] = hexToHsl(hex);
      currentHue = h;
      pickerX = s/100;
      pickerY = 1 - (l/(100 - s/2));
      redrawPicker();
    });
    presetsEl.appendChild(p);
  });

  // Appliquer
  document.getElementById('color-apply').addEventListener('click', applyAccentColor);
  document.getElementById('color-hex').addEventListener('change', e => {
    const hex = e.target.value;
    if (/^#[0-9a-fA-F]{6}$/.test(hex)) {
      const [h,s,l] = hexToHsl(hex);
      currentHue = h; pickerX = s/100; pickerY = 1-(l/(100-s/2));
      redrawPicker();
    }
  });
}

function applyAccentColor() {
  const hex = document.getElementById('color-hex').value;
  if (!/^#[0-9a-fA-F]{6}$/.test(hex)) return;
  // Couleur secondaire légèrement plus claire
  const [h,s,l] = hexToHsl(hex);
  const hex2 = hslToHex((h+15)%360, Math.min(s+10,100), Math.min(l+15,90));
  document.documentElement.style.setProperty('--accent',  hex);
  document.documentElement.style.setProperty('--accent2', hex2);
  document.documentElement.style.setProperty('--glass-active', hex + '20');
  localStorage.setItem(COLOR_KEY, hex);
  // Mise à jour en temps réel des orbes (pas rechargées par CSS custom props sur background inline)
  document.querySelectorAll('.orb').forEach(o => {
    const cur = o.style.background;
    if (cur) o.style.background = 'rgba(' + r + ',' + g + ',' + b + ',' + (o.classList.contains('orb-1') ? '0.1' : o.classList.contains('orb-2') ? '0.08' : '0.06') + ')';
  });
  // Feedback visuel
  const btn = document.getElementById('color-apply');
  btn.textContent = '✓ Appliqué';
  setTimeout(() => { btn.textContent = 'Appliquer'; }, 1500);
}

// Charger la couleur au démarrage
(function loadAccentColor() {
  const saved = localStorage.getItem(COLOR_KEY);
  if (saved && /^#[0-9a-fA-F]{6}$/.test(saved)) {
    const [h,s,l] = hexToHsl(saved);
    const hex2 = hslToHex((h+15)%360, Math.min(s+10,100), Math.min(l+15,90));
    const r = parseInt(saved.slice(1,3),16);
    const g = parseInt(saved.slice(3,5),16);
    const b = parseInt(saved.slice(5,7),16);
    document.documentElement.style.setProperty('--accent',   saved);
    document.documentElement.style.setProperty('--accent2',  hex2);
    document.documentElement.style.setProperty('--accent-r', r);
    document.documentElement.style.setProperty('--accent-g', g);
    document.documentElement.style.setProperty('--accent-b', b);
    document.documentElement.style.setProperty('--glass-active', 'rgba('+r+','+g+','+b+',0.12)');
  }
})();
</script>
</body>

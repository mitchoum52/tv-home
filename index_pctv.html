<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>TV Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Orbitron:wght@900&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0a0c;
    --surface:  #111114;
    --border:   #1e1e24;
    --accent:   #e8ff47;
    --accent2:  #47ffe0;
    --text:     #d0d0da;
    --text-dim: #44444e;
    --font-ui:  'DM Mono', monospace;
    --font-big: 'Syne', sans-serif;
    --font-clock: 'Orbitron', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; cursor: none !important; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    overflow: hidden;
    user-select: none;
    cursor: none;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: .025;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed; top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
    z-index: 1;
  }

  .wrapper {
    position: relative; z-index: 1;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 48px;
    padding: 40px;
  }

  .clock-block { display: flex; flex-direction: column; align-items: center; gap: 10px; }

  #clock {
    font-family: var(--font-clock);
    font-size: clamp(60px, 9vw, 108px);
    font-weight: 900;
    letter-spacing: .05em;
    line-height: 1;
    background: linear-gradient(180deg, #ffffff 60%, #666 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  #date { font-size: 13px; letter-spacing: .2em; color: var(--accent2); text-transform: uppercase; }
  .sep  { width: 40px; height: 1px; background: var(--border); }

  .sites {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: stretch;
    max-width: 100%;
  }

  .btn {
    position: relative;
    display: inline-flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: space-between;
    gap: 40px;
    padding: 40px 48px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 32px;
    cursor: default;
    text-decoration: none;
    color: var(--text);
    transition: border-color .2s, transform .15s, box-shadow .2s;
    overflow: hidden;
    min-width: 280px;
    outline: none;
  }

  .btn::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(232,255,71,.08) 0%, transparent 70%);
    opacity: 0; transition: opacity .3s;
    border-radius: 32px;
  }

  .btn::after {
    content: '';
    position: absolute;
    left: 0; top: 20%; bottom: 20%;
    width: 6px;
    border-radius: 8px;
    background: var(--accent);
    opacity: 0; transition: opacity .2s;
  }

  /* Hover désactivé — seul le bouton .active a le style mis en avant */
  .btn.active {
    border-color: var(--accent);
    transform: translateY(-4px);
    box-shadow: 0 16px 60px rgba(232,255,71,.15), 0 0 0 2px var(--accent);
  }
  .btn.active::before, .btn.active::after { opacity: 1; }
  .btn.active .btn-num { color: var(--accent); }
  .btn.active .btn-arrow { color: var(--accent); transform: translate(2px, -2px); }

  .btn-num { font-size: 1.2rem; color: var(--text-dim); letter-spacing: .15em; transition: color .2s; }

  .btn-name-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    gap: 20px;
  }

  .btn-name {
    font-family: var(--font-big);
    font-size: 1.8rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: -.01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .btn-arrow {
    font-size: 1.5rem; color: var(--text-dim);
    flex-shrink: 0;
    transition: color .2s, transform .2s;
  }



  /* Indicateur de geste (feedback visuel) */
  #gesture-hint {
    position: fixed;
    bottom: 32px; left: 50%; transform: translateX(-50%);
    font-size: 11px; letter-spacing: .15em; color: var(--text-dim);
    text-transform: uppercase;
    opacity: 0;
    transition: opacity .4s;
    z-index: 10;
    pointer-events: none;
  }
  #gesture-hint.show { opacity: 1; }

  /* Flèches de navigation visibles */
  #nav-arrows {
    position: fixed;
    bottom: 28px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; align-items: center;
    z-index: 10;
    opacity: 0.25;
    transition: opacity .3s;
  }
  #nav-arrows:hover { opacity: 0.7; }
  .nav-arr {
    width: 36px; height: 36px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: border-color .15s, color .15s;
  }
  .nav-arr:hover { border-color: var(--accent); color: var(--accent); }

  .hint { font-size: 14px; color: var(--text-dim); letter-spacing: .1em; text-align: center; line-height: 2; }

  #btn-settings {
    position: fixed; bottom: 28px; right: 32px;
    width: 64px; height: 64px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50%;
    color: var(--text-dim);
    font-size: 24px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    z-index: 50;
    transition: border-color .2s, color .2s, transform .3s;
  }
  #btn-settings:hover { border-color: #333; color: var(--accent); transform: rotate(60deg); }
  #btn-settings.settings-focused {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent), 0 8px 30px rgba(232,255,71,.25);
    transform: rotate(60deg) scale(1.1);
  }

  #overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(6px); z-index: 100; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .25s; }
  #overlay.open { opacity: 1; pointer-events: all; }
  body.overlay-open, body.overlay-open * { cursor: default !important; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; width: min(560px, 92vw); max-height: 80vh; overflow-y: auto; padding: 28px; display: flex; flex-direction: column; gap: 20px; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-family: var(--font-big); font-size: 18px; font-weight: 700; color: var(--accent2); }
  .modal-close { background: transparent; border: none; color: var(--text-dim); font-size: 20px; cursor: pointer; line-height: 1; }
  .site-list { display: flex; flex-direction: column; gap: 8px; }
  .site-row { display: flex; align-items: center; gap: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; }
  .site-row-grip { color: var(--text-dim); font-size: 12px; cursor: grab; }
  .site-row-info { flex: 1; min-width: 0; }
  .site-row-name { font-family: var(--font-big); font-size: 14px; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .site-row-url  { font-size: 10px; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .site-row-actions { display: flex; gap: 6px; }
  .row-btn { width: 28px; height: 28px; background: transparent; border: 1px solid var(--border); border-radius: 6px; color: #fff; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .row-btn.danger:hover { background: #2a1010; color: #ff6b6b; }
  .form-block { border-top: 1px solid var(--border); padding-top: 18px; display: flex; flex-direction: column; gap: 10px; }
  .form-block label { font-size: 10px; text-transform: uppercase; color: #fff; }
  .form-block input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 9px 12px; color: var(--text); outline: none; }
  .form-row { display: flex; gap: 8px; }
  .form-btn { flex: 1; padding: 10px; border-radius: 6px; cursor: pointer; border: 1px solid var(--border); }
  .form-btn.primary { background: var(--accent); color: var(--bg); font-weight: 600; }
</style>
</head>
<body>

<div class="wrapper">
  <div class="clock-block">
    <div id="clock">00:00</div>
    <div id="date">—</div>
  </div>
  <div class="sep"></div>
  <div class="sites" id="sites"></div>
  <div id="hint"></div>
</div>

<!-- Flèches de navigation discrètes -->
<div id="nav-arrows">
  <div class="nav-arr" id="arr-left">←</div>
  <div class="nav-arr" id="arr-up">↑</div>
  <div class="nav-arr" id="arr-down">↓</div>
  <div class="nav-arr" id="arr-right">→</div>
</div>

<button id="btn-settings" title="Gérer les sites">⚙</button>

<div id="overlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Gérer les sites</span>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="site-list" id="site-list"></div>
    <div class="form-block">
      <div class="form-title" id="form-title" style="font-size: 11px; color: var(--accent2); margin-bottom: 8px;">AJOUTER UN SITE</div>
      <div>
        <label>Nom affiché</label>
        <input type="text" id="inp-name" placeholder="Ex : Arte TV" autocomplete="off" />
      </div>
      <div style="margin-top: 8px;">
        <label>URL</label>
        <input type="url" id="inp-url" placeholder="https://..." autocomplete="off" />
      </div>
      <div class="form-row" style="margin-top: 12px;">
        <button class="form-btn" id="form-cancel">Annuler</button>
        <button class="form-btn primary" id="form-save">Ajouter</button>
      </div>
    </div>
  </div>
</div>

<script>
const DEFAULT_SITES = [
  { name: "Flemmix",       url: "https://flemmix.surf/"         },
  { name: "Xefod",         url: "https://xefod.com/"            },
  { name: "PapaduStream",  url: "https://papadustream.archi/"   },
  { name: "French Stream", url: "https://french-stream.one/"    },
  { name: "YouTube",       url: "https://www.youtube.com/"      },
];

const STORAGE_KEY = 'tv-dashboard-sites';
let sites   = [];
let editIdx = null;
let activeIdx = 0; // index du bouton actuellement sélectionné

// ── CHARGEMENT ──
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    sites = raw ? JSON.parse(raw) : [...DEFAULT_SITES];
  } catch { sites = [...DEFAULT_SITES]; }
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(sites));
}

// ── HORLOGE ──
function tick() {
  const now    = new Date();
  const pad    = n => String(n).padStart(2, '0');
  const days   = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const months = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  document.getElementById('clock').textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
  document.getElementById('date').textContent  = `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
}

// ── NAVIGATION ──
function setActive(idx) {
  const btns = document.querySelectorAll('.btn');
  if (!btns.length) return;
  idx = Math.max(0, Math.min(idx, btns.length - 1));
  btns.forEach(b => b.classList.remove('active'));
  btns[idx].classList.add('active');
  btns[idx].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  activeIdx = idx;
}

function openActive() {
  const overlay = document.getElementById('overlay');
  if (overlay.classList.contains('open')) return;

  if (focusZone === 'settings') {
    setSettingsActive(false);
    renderList();
    overlay.classList.add('open');
    document.body.classList.add('overlay-open');
    return;
  }

  if (sites[activeIdx]) {
    window.location.href = sites[activeIdx].url;
  }
}

// Calcule les indices par ligne (selon position DOM)
function getGrid() {
  const btns = Array.from(document.querySelectorAll('.btn'));
  if (!btns.length) return [];

  // Groupe par ligne (même top offset)
  const rows = [];
  let currentRow = [];
  let lastTop = null;

  btns.forEach((btn, i) => {
    const top = Math.round(btn.getBoundingClientRect().top);
    if (lastTop === null || Math.abs(top - lastTop) > 10) {
      if (currentRow.length) rows.push(currentRow);
      currentRow = [i];
      lastTop = top;
    } else {
      currentRow.push(i);
    }
  });
  if (currentRow.length) rows.push(currentRow);
  return rows;
}

// ── FOCUS ZONE ──
// 'sites' | 'settings'
let focusZone = 'sites';

function setSettingsActive(active) {
  const btn = document.getElementById('btn-settings');
  const btns = document.querySelectorAll('.btn');
  if (active) {
    btn.classList.add('settings-focused');
    focusZone = 'settings';
    // Retirer le focus visuel de tous les boutons sites
    btns.forEach(b => b.classList.remove('active'));
  } else {
    btn.classList.remove('settings-focused');
    focusZone = 'sites';
    // Remettre le focus sur le dernier bouton actif
    if (btns[activeIdx]) btns[activeIdx].classList.add('active');
  }
}

function navigateVertical(dir) {
  // dir: -1 = haut, +1 = bas

  // Depuis les sites, aller vers le bas → activer le bouton paramètres (depuis la dernière ligne)
  if (focusZone === 'sites' && dir === 1) {
    const grid = getGrid();
    let rowIdx = -1, colIdx = -1;
    for (let r = 0; r < grid.length; r++) {
      const c = grid[r].indexOf(activeIdx);
      if (c !== -1) { rowIdx = r; colIdx = c; break; }
    }
    if (rowIdx === -1) return;
    if (rowIdx === grid.length - 1) {
      // Dernière ligne → on bascule sur paramètres
      setSettingsActive(true);
    } else {
      // Ligne intermédiaire → navigation classique vers le bas
      const row = grid[rowIdx + 1];
      setActive(row[Math.min(colIdx, row.length - 1)]);
    }
    return;
  }

  // Depuis paramètres, aller vers le haut → retour aux sites
  if (focusZone === 'settings' && dir === -1) {
    setSettingsActive(false);
    const grid = getGrid();
    if (grid.length) {
      const lastRow = grid[grid.length - 1];
      setActive(lastRow[Math.min(activeIdx, lastRow.length - 1)]);
    }
    return;
  }

  // Navigation multi-ligne standard (si plusieurs lignes, vers le haut)
  if (focusZone === 'sites' && dir === -1) {
    const grid = getGrid();
    let rowIdx = -1, colIdx = -1;
    for (let r = 0; r < grid.length; r++) {
      const c = grid[r].indexOf(activeIdx);
      if (c !== -1) { rowIdx = r; colIdx = c; break; }
    }
    if (rowIdx === -1 || rowIdx === 0) return;
    const row = grid[rowIdx - 1];
    setActive(row[Math.min(colIdx, row.length - 1)]);
  }
}

// ── GESTES ──
// Accumulation de déplacement sur mousemove brut (KDE Connect envoie du mousemove sans mousedown)
const STEP = 30; // pixels accumulés pour déclencher un changement
let accumX = 0, accumY = 0, lastMX = null, lastMY = null;
let cooldown = false;

function triggerNav(dir) {
  // dir: 'left' | 'right' | 'up' | 'down'
  if (cooldown) return;
  // Gauche/Droite : uniquement sur les sites
  if (dir === 'right' && focusZone === 'sites') setActive(activeIdx + 1);
  if (dir === 'left'  && focusZone === 'sites') setActive(activeIdx - 1);
  if (dir === 'down')  navigateVertical(1);
  if (dir === 'up')    navigateVertical(-1);
  accumX = 0; accumY = 0;
  cooldown = true;
  setTimeout(() => { cooldown = false; }, 300);
}

document.addEventListener('mousemove', e => {
  if (document.getElementById('overlay').classList.contains('open')) return;
  if (lastMX === null) { lastMX = e.clientX; lastMY = e.clientY; return; }

  const dx = e.clientX - lastMX;
  const dy = e.clientY - lastMY;
  lastMX = e.clientX; lastMY = e.clientY;

  // On ignore les micro-mouvements parasites
  if (Math.abs(dx) < 2 && Math.abs(dy) < 2) return;

  accumX += dx;
  accumY += dy;

  if (Math.abs(accumX) >= STEP && Math.abs(accumX) > Math.abs(accumY)) {
    triggerNav(accumX > 0 ? 'right' : 'left');
  } else if (Math.abs(accumY) >= STEP && Math.abs(accumY) > Math.abs(accumX)) {
    triggerNav(accumY > 0 ? 'down' : 'up');
  }
});

// Réinitialise l'accumulation si la souris reste immobile un moment
let idleTimer = null;
document.addEventListener('mousemove', () => {
  clearTimeout(idleTimer);
  idleTimer = setTimeout(() => { accumX = 0; accumY = 0; }, 400);
});

// Touch (écran tactile)
let touchStartX = null, touchStartY = null;
document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener('touchend', e => {
  if (touchStartX === null) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const adx = Math.abs(dx), ady = Math.abs(dy);
  if (adx < 10 && ady < 10) { openActive(); } // tap
  else if (adx > 40 && adx > ady) triggerNav(dx > 0 ? 'right' : 'left');
  else if (ady > 40 && ady > adx) triggerNav(dy > 0 ? 'down' : 'up');
  touchStartX = null; touchStartY = null;
});

// Validation au clic/tap — on compare la position au mousedown vs mouseup
let clickStartX = null, clickStartY = null;
document.addEventListener('mousedown', e => { clickStartX = e.clientX; clickStartY = e.clientY; });
document.addEventListener('mouseup', e => {
  if (clickStartX === null) return;
  const dx = Math.abs(e.clientX - clickStartX), dy = Math.abs(e.clientY - clickStartY);
  if (dx < 8 && dy < 8 && !e.target.closest('#btn-settings, .btn-edit, #overlay')) {
    openActive();
  }
  clickStartX = null; clickStartY = null;
});

// ── CLAVIER (bonus) ──
document.addEventListener('keydown', e => {
  if (document.getElementById('overlay').classList.contains('open')) return;
  if (e.key === 'ArrowRight' && focusZone === 'sites') { e.preventDefault(); setActive(activeIdx + 1); }
  if (e.key === 'ArrowLeft'  && focusZone === 'sites') { e.preventDefault(); setActive(activeIdx - 1); }
  if (e.key === 'ArrowDown')  { e.preventDefault(); navigateVertical(1); }
  if (e.key === 'ArrowUp')    { e.preventDefault(); navigateVertical(-1); }
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openActive(); }
  // Raccourcis numériques 1-9
  const num = parseInt(e.key);
  if (num >= 1 && num <= sites.length) { setSettingsActive(false); setActive(num - 1); }
});

// ── FLÈCHES UI ──
document.getElementById('arr-left') .addEventListener('click', () => setActive(activeIdx - 1));
document.getElementById('arr-right').addEventListener('click', () => setActive(activeIdx + 1));
document.getElementById('arr-up')   .addEventListener('click', () => navigateVertical(-1));
document.getElementById('arr-down') .addEventListener('click', () => navigateVertical(1));

// ── RENDU BOUTONS ──
function renderButtons() {
  const container = document.getElementById('sites');
  container.innerHTML = '';

  sites.forEach((site, i) => {
    const a = document.createElement('a');
    a.className = 'btn';
    a.innerHTML = `
      <span class="btn-num">0${i + 1}</span>
      <div class="btn-name-row">
        <span class="btn-name">${site.name}</span>
        <span class="btn-arrow">↗</span>
      </div>
    `;
    container.appendChild(a);
  });

  // Uniformiser les tailles — on attend que les polices soient chargées
  function sizeButtons() {
    const btns = container.querySelectorAll('.btn');
    if (!btns.length) return;
    btns.forEach(b => { b.style.width = 'auto'; b.style.height = 'auto'; });
    let maxW = 0, maxH = 0;
    btns.forEach(b => {
      maxW = Math.max(maxW, b.offsetWidth, b.scrollWidth);
      maxH = Math.max(maxH, b.offsetHeight, b.scrollHeight);
    });
    btns.forEach(b => { b.style.width = (maxW + 2) + 'px'; b.style.height = (maxH + 2) + 'px'; });

    // Focus initial sur le premier bouton
    setActive(Math.min(activeIdx, sites.length - 1));
  }

  // document.fonts.ready garantit que les polices custom sont bien rendues avant de mesurer
  document.fonts.ready.then(() => {
    requestAnimationFrame(() => requestAnimationFrame(sizeButtons));
  });
}

// ── MODALE GESTION ──
function renderList() {
  const list = document.getElementById('site-list');
  list.innerHTML = '';
  sites.forEach((site, i) => {
    const row = document.createElement('div');
    row.className = 'site-row';
    row.innerHTML = `
      <span class="site-row-grip">⠿</span>
      <div class="site-row-info">
        <div class="site-row-name">${site.name}</div>
        <div class="site-row-url">${site.url}</div>
      </div>
      <div class="site-row-actions">
        <button class="row-btn" data-action="up" data-idx="${i}">↑</button>
        <button class="row-btn" data-action="down" data-idx="${i}">↓</button>
        <button class="row-btn" data-action="edit" data-idx="${i}">✎</button>
        <button class="row-btn danger" data-action="del" data-idx="${i}">✕</button>
      </div>
    `;
    list.appendChild(row);
  });

  list.querySelectorAll('.row-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.idx);
      const action = btn.dataset.action;
      if (action === 'up' && idx > 0) [sites[idx-1], sites[idx]] = [sites[idx], sites[idx-1]];
      if (action === 'down' && idx < sites.length - 1) [sites[idx], sites[idx+1]] = [sites[idx+1], sites[idx]];
      if (action === 'del') { sites.splice(idx, 1); if (activeIdx >= sites.length) activeIdx = sites.length - 1; }
      if (action === 'edit') { openEdit(idx); return; }
      save(); renderList(); renderButtons();
    });
  });
}

function openEdit(idx) {
  editIdx = idx;
  document.getElementById('form-title').textContent = 'Modifier le site';
  document.getElementById('form-save').textContent  = 'Enregistrer';
  document.getElementById('inp-name').value = sites[idx].name;
  document.getElementById('inp-url').value  = sites[idx].url;
  document.getElementById('overlay').classList.add('open');
  document.getElementById('inp-name').focus();
}

function openAdd() {
  editIdx = null;
  document.getElementById('form-title').textContent = 'Ajouter un site';
  document.getElementById('form-save').textContent  = 'Ajouter';
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-url').value = '';
}

document.getElementById('form-save').addEventListener('click', () => {
  const name = document.getElementById('inp-name').value.trim();
  const url  = document.getElementById('inp-url').value.trim();
  if (!name || !url) return;
  if (editIdx !== null) sites[editIdx] = { name, url };
  else sites.push({ name, url });
  save(); renderList(); renderButtons(); openAdd();
});

document.getElementById('form-cancel').addEventListener('click', () => {
  openAdd();
  document.getElementById('overlay').classList.remove('open');
  document.body.classList.remove('overlay-open');
});
document.getElementById('btn-settings').addEventListener('click', () => {
  renderList();
  document.getElementById('overlay').classList.add('open');
  document.body.classList.add('overlay-open');
});
document.getElementById('modal-close').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('open');
  document.body.classList.remove('overlay-open');
});

// ── INIT ──
load();
tick();
setInterval(tick, 1000);
renderButtons();
</script>
</body>
</html>

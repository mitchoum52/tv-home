<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>TV Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Orbitron:wght@900&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0a0c;
    --surface:  #111114;
    --border:   #1e1e24;
    --accent:   #e8ff47;
    --accent2:  #47ffe0;
    --text:     #d0d0da;
    --text-dim: #44444e;
    --font-ui:  'DM Mono', monospace;
    --font-big: 'Syne', sans-serif;
    --font-clock: 'Orbitron', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    overflow: hidden;
    user-select: none;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: .025;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed; top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
    z-index: 1;
  }

  .wrapper {
    position: relative; z-index: 1;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 48px;
    padding: 40px;
  }

  /* ── horloge ── */
  .clock-block { display: flex; flex-direction: column; align-items: center; gap: 10px; }

  #clock {
    font-family: var(--font-clock);
    font-size: clamp(60px, 9vw, 108px);
    font-weight: 900;
    letter-spacing: .05em;
    line-height: 1;
    background: linear-gradient(180deg, #ffffff 60%, #666 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  #date { font-size: 13px; letter-spacing: .2em; color: var(--text-dim); text-transform: uppercase; }
  .sep  { width: 40px; height: 1px; background: var(--border); }

  .sites {
    display: flex;
    gap: 28px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: stretch;
    max-width: 1960px;
  }

  .btn {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: space-between;
    gap: 28px;
    padding: 20px 22px 18px;
    min-width: 330px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    cursor: pointer;
    text-decoration: none;
    color: var(--text);
    transition: border-color .2s, transform .15s, box-shadow .2s;
    overflow: hidden;
  }

  .btn::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(232,255,71,.08) 0%, transparent 70%);
    opacity: 0; transition: opacity .3s;
  }

  .btn::after {
    content: '';
    position: absolute;
    left: 0; top: 20%; bottom: 20%;
    width: 4px;          /* était 2px */
    border-radius: 4px;
    background: var(--accent);
    opacity: 0; transition: opacity .2s;
  }

  .btn:hover { border-color: #2e2e38; transform: translateY(-4px); box-shadow: 0 16px 60px rgba(0,0,0,.5); }
  .btn:hover::before, .btn:hover::after { opacity: 1; }
  .btn:active { transform: translateY(0); }

  .btn-num   { font-size: clamp(12px, 1vw, 22px); color: var(--text-dim); letter-spacing: .15em; }
  .btn-name  { font-family: var(--font-big); font-size: clamp(20px, 2.5vw, 56px); font-weight: 700; color: #fff; letter-spacing: -.01em; white-space: nowrap; width: 100%; padding-right: 52px; }

  .btn-arrow {
    position: absolute; bottom: 16px; right: 16px;
    font-size: clamp(15px, 1.2vw, 28px); color: var(--text-dim);
    transition: color .2s, transform .2s;
  }
  .btn:hover .btn-arrow { color: var(--accent); transform: translate(2px, -2px); }

  /* petit bouton edit sur chaque carte */
  .btn-edit {
    position: absolute; top: 10px; right: 10px;
    width: 22px; height: 22px;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 4px;
    color: var(--text-dim);
    font-size: 11px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transition: opacity .2s, border-color .2s, color .2s;
    z-index: 2;
  }
  .btn:hover .btn-edit { opacity: 1; }
  .btn-edit:hover { border-color: var(--border); color: var(--accent); }

  /* ── hint ── */
  .hint { font-size: 14px; color: var(--text-dim); letter-spacing: .1em; text-align: center; line-height: 2; }
  .hint kbd {
    display: inline-block; padding: 2px 10px;
    border: 1px solid var(--border); border-radius: 6px;
    font-family: var(--font-ui); font-size: 12px; margin: 0 2px; color: var(--text-dim);
  }

  /* ── bouton paramètres (engrenage) ── */
  #btn-settings {
    position: fixed; bottom: 28px; right: 32px;
    width: 72px; height: 72px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50%;
    color: var(--text-dim);
    font-size: 30px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    z-index: 50;
    transition: border-color .2s, color .2s, transform .3s;
  }
  #btn-settings:hover { border-color: #333; color: var(--accent); transform: rotate(60deg); }

  /* ── overlay / modal ── */
  #overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.7);
    backdrop-filter: blur(6px);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity .25s;
  }
  #overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    width: min(560px, 92vw);
    max-height: 80vh;
    overflow-y: auto;
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
  }

  .modal-title {
    font-family: var(--font-big);
    font-size: 18px; font-weight: 700; color: #fff;
  }

  .modal-close {
    background: transparent; border: none;
    color: var(--text-dim); font-size: 20px;
    cursor: pointer; line-height: 1;
    transition: color .2s;
  }
  .modal-close:hover { color: #fff; }

  .site-list { display: flex; flex-direction: column; gap: 8px; }

  .site-row {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    transition: border-color .2s;
  }
  .site-row:hover { border-color: #2a2a34; }

  .site-row-grip { color: var(--text-dim); font-size: 12px; cursor: grab; flex-shrink: 0; }
  .site-row-info { flex: 1; min-width: 0; }
  .site-row-name { font-family: var(--font-big); font-size: 14px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .site-row-url  { font-size: 10px; color: var(--text-dim); letter-spacing: .03em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .site-row-actions { display: flex; gap: 6px; flex-shrink: 0; }

  .row-btn {
    width: 28px; height: 28px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim); font-size: 12px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color .2s, color .2s, background .2s;
  }
  .row-btn:hover { border-color: #333; color: #fff; }
  .row-btn.danger:hover { background: #2a1010; border-color: #5a2020; color: #ff6b6b; }

  .form-block {
    border-top: 1px solid var(--border);
    padding-top: 18px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .form-block label { font-size: 10px; letter-spacing: .15em; text-transform: uppercase; color: var(--text-dim); }
  .form-block input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 9px 12px; color: var(--text);
    font-family: var(--font-ui); font-size: 13px; outline: none;
    transition: border-color .2s; user-select: text;
  }
  .form-block input:focus { border-color: var(--accent); }
  .form-block input::placeholder { color: var(--text-dim); }
  .form-row { display: flex; gap: 8px; }
  .form-btn {
    flex: 1; padding: 10px; border-radius: 6px;
    font-family: var(--font-ui); font-size: 12px; letter-spacing: .08em;
    cursor: pointer; border: 1px solid var(--border); transition: all .2s;
  }
  .form-btn.primary { background: var(--accent); border-color: var(--accent); color: var(--bg); font-weight: 500; }
  .form-btn.primary:hover { background: #d4eb30; }
  .form-btn.secondary { background: transparent; color: var(--text-dim); }
  .form-btn.secondary:hover { color: #fff; border-color: #333; }
  .form-title { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 4px; }

  .modal::-webkit-scrollbar { width: 4px; }
  .modal::-webkit-scrollbar-track { background: transparent; }
  .modal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div class="wrapper">
  <div class="clock-block">
    <div id="clock">00:00</div>
    <div id="date">—</div>
  </div>
  <div class="sep"></div>
  <div class="sites" id="sites"></div>
  <div class="hint" id="hint"></div>
</div>

<button id="btn-settings" title="Gérer les sites">⚙</button>

<div id="overlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Gérer les sites</span>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="site-list" id="site-list"></div>
    <div class="form-block" id="form-block">
      <div class="form-title" id="form-title">Ajouter un site</div>
      <div>
        <label>Nom affiché</label>
        <input type="text" id="inp-name" placeholder="Ex : Arte TV" autocomplete="off" />
      </div>
      <div>
        <label>URL</label>
        <input type="url" id="inp-url" placeholder="https://..." autocomplete="off" />
      </div>
      <div class="form-row">
        <button class="form-btn secondary" id="form-cancel">Annuler</button>
        <button class="form-btn primary"   id="form-save">Ajouter</button>
      </div>
    </div>
  </div>
</div>

<script>
const DEFAULT_SITES = [
  { name: "Flemmix",       url: "https://flemmix.surf/"         },
  { name: "Xefod",         url: "https://xefod.com/"            },
  { name: "PapaduStream",  url: "https://papadustream.archi/"   },
  { name: "French Stream", url: "https://french-stream.one/"    },
  { name: "YouTube",       url: "https://www.youtube.com/"      },
];

const STORAGE_KEY = 'tv-dashboard-sites';
let sites   = [];
let editIdx = null;

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    sites = raw ? JSON.parse(raw) : [...DEFAULT_SITES];
  } catch { sites = [...DEFAULT_SITES]; }
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(sites));
}

function tick() {
  const now    = new Date();
  const pad    = n => String(n).padStart(2, '0');
  const days   = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const months = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  document.getElementById('clock').textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
  document.getElementById('date').textContent  = `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
}

function renderButtons() {
  const container = document.getElementById('sites');
  container.innerHTML = '';

  const n = sites.length;
  if (n === 0) return;

  // Trouve le nombre de colonnes qui minimise les cases vides
  // (max 5 colonnes)
  const maxCols = Math.min(n, 5);
  let bestCols = 1, bestRemainder = Infinity;
  for (let c = 1; c <= maxCols; c++) {
    const rows = Math.ceil(n / c);
    const remainder = (c * rows) - n;
    if (remainder < bestRemainder || (remainder === bestRemainder && c > bestCols)) {
      bestRemainder = remainder;
      bestCols = c;
    }
  }

  sites.forEach((site, i) => {
    const a = document.createElement('a');
    a.className = 'btn';
    a.dataset.url = site.url;
    a.style.flexBasis = `calc((100% - ${bestCols - 1} * 28px) / ${bestCols})`;
    a.style.maxWidth  = a.style.flexBasis;
    a.style.minWidth  = '0';
    a.style.alignSelf = 'stretch';
    a.innerHTML = `
      <span class="btn-num">0${i + 1}</span>
      <span class="btn-name">${site.name}</span>
      <span class="btn-arrow">↗</span>
      <button class="btn-edit" title="Modifier" data-idx="${i}">✎</button>
    `;
    a.addEventListener('click', e => {
      if (!e.target.closest('.btn-edit')) window.open(site.url, '_blank', 'noopener');
    });
    a.querySelector('.btn-edit').addEventListener('click', e => {
      e.preventDefault(); e.stopPropagation();
      openEdit(parseInt(e.currentTarget.dataset.idx));
    });
    container.appendChild(a);
  });

  document.getElementById('hint').innerHTML = '';

  // Égalise la hauteur de tous les boutons sur le plus grand
  requestAnimationFrame(() => {
    const btns = container.querySelectorAll('.btn');
    let maxH = 0;
    btns.forEach(b => { b.style.height = ''; maxH = Math.max(maxH, b.offsetHeight); });
    btns.forEach(b => { b.style.height = maxH + 'px'; });

    // Ajuste la taille de police des noms : part de la taille calculée (clamp)
    // et réduit jusqu'à ce que tous les noms rentrent sans déborder ni se superposer à la flèche
    const names = container.querySelectorAll('.btn-name');
    if (names.length === 0) return;
    // Taille de départ = taille courante calculée par le navigateur
    let fontSize = parseFloat(getComputedStyle(names[0]).fontSize);
    const minSize = 10;
    let fits = false;
    while (!fits && fontSize >= minSize) {
      fits = true;
      names.forEach(el => {
        el.style.fontSize = fontSize + 'px';
        if (el.scrollWidth > el.clientWidth) fits = false;
      });
      if (!fits) fontSize -= 0.5;
    }
  });
}

function renderList() {
  const list = document.getElementById('site-list');
  list.innerHTML = '';
  sites.forEach((site, i) => {
    const row = document.createElement('div');
    row.className = 'site-row';
    row.innerHTML = `
      <span class="site-row-grip">⠿</span>
      <div class="site-row-info">
        <div class="site-row-name">${site.name}</div>
        <div class="site-row-url">${site.url}</div>
      </div>
      <div class="site-row-actions">
        <button class="row-btn" title="Monter"    data-action="up"   data-idx="${i}">↑</button>
        <button class="row-btn" title="Descendre" data-action="down" data-idx="${i}">↓</button>
        <button class="row-btn" title="Modifier"  data-action="edit" data-idx="${i}">✎</button>
        <button class="row-btn danger" title="Supprimer" data-action="del" data-idx="${i}">✕</button>
      </div>
    `;
    list.appendChild(row);
  });

  list.querySelectorAll('.row-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx    = parseInt(btn.dataset.idx);
      const action = btn.dataset.action;
      if (action === 'up'   && idx > 0)               { [sites[idx-1], sites[idx]] = [sites[idx], sites[idx-1]]; }
      if (action === 'down' && idx < sites.length - 1) { [sites[idx], sites[idx+1]] = [sites[idx+1], sites[idx]]; }
      if (action === 'del')  { sites.splice(idx, 1); }
      if (action === 'edit') { openEdit(idx); return; }
      save(); renderList(); renderButtons();
    });
  });
}

function openAdd() {
  editIdx = null;
  document.getElementById('form-title').textContent = 'Ajouter un site';
  document.getElementById('form-save').textContent  = 'Ajouter';
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-url').value  = '';
  document.getElementById('inp-name').focus();
}

function openEdit(idx) {
  editIdx = idx;
  document.getElementById('form-title').textContent = 'Modifier le site';
  document.getElementById('form-save').textContent  = 'Enregistrer';
  document.getElementById('inp-name').value = sites[idx].name;
  document.getElementById('inp-url').value  = sites[idx].url;
  document.getElementById('inp-name').focus();
}

document.getElementById('form-cancel').addEventListener('click', openAdd);

document.getElementById('form-save').addEventListener('click', () => {
  const name = document.getElementById('inp-name').value.trim();
  const url  = document.getElementById('inp-url').value.trim();
  if (!name || !url) return;
  if (editIdx !== null) {
    sites[editIdx] = { name, url };
  } else {
    sites.push({ name, url });
  }
  save(); renderList(); renderButtons(); openAdd();
});

['inp-name','inp-url'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('form-save').click();
  });
});

document.getElementById('btn-settings').addEventListener('click', () => {
  renderList(); openAdd();
  document.getElementById('overlay').classList.add('open');
});

function closeModal() { document.getElementById('overlay').classList.remove('open'); }
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeModal();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

load();
tick();
setInterval(tick, 1000);
renderButtons();
</script>
</body>
</html>
